<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Crew — Panel</title>
  <link rel="icon" type="image/png" href="https://www.thecrewacademy.es/cdn/shop/files/Diseno_sin_titulo_27.png?crop=center&height=32&v=1773863841&width=32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:   #080808;
      --surf: #0d0d0d;
      --s2:   #111111;
      --s3:   #161616;
      --gold: #C9A84C;
      --ga:   rgba(201,168,76,.09);
      --gb:   rgba(201,168,76,.20);
      --gc:   rgba(201,168,76,.05);
      --t1:   #f0ede6;
      --t2:   rgba(240,237,230,.55);
      --t3:   rgba(240,237,230,.24);
      --t4:   rgba(240,237,230,.10);
      --ln:   rgba(240,237,230,.07);
      --ln2:  rgba(240,237,230,.04);
      --grn:  #7FAE7A;
      --red:  #C47068;
      --blu:  #7090A8;
      --orn:  #C4622D;
      --r:    4px;
      --sw:   228px;
      --th:   56px;
      --font: 'Montserrat', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--t1);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── APP SHELL ─────────────────────────────────────────── */
    .app { display: flex; height: 100vh; }

    /* ── SIDEBAR ───────────────────────────────────────────── */
    .sidebar {
      width: var(--sw);
      min-width: var(--sw);
      background: var(--surf);
      border-right: 1px solid var(--ln);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--ln); border-radius: 2px; }

    .sb-brand {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--ln);
      flex-shrink: 0;
    }
    .sb-logo {
      height: 22px;
      filter: brightness(0) invert(1);
      opacity: .5;
      display: block;
      margin-bottom: 10px;
    }
    .sb-name {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .sb-sub { font-size: 8px; color: var(--t3); margin-top: 2px; letter-spacing: .06em; }

    .sb-nav { flex: 1; padding: 8px 0 12px; }
    .sb-section {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--t4);
      padding: 16px 20px 5px;
    }
    .sb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      font-size: 11px;
      font-weight: 500;
      color: var(--t2);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: color .15s, background .15s;
      user-select: none;
      text-decoration: none;
    }
    .sb-item:hover { color: var(--t1); background: rgba(240,237,230,.025); }
    .sb-item.active { color: var(--gold); border-left-color: var(--gold); background: var(--ga); }
    .sb-icon { font-size: 10px; opacity: .55; width: 14px; text-align: center; flex-shrink: 0; }
    .sb-item.active .sb-icon { opacity: 1; }
    .sb-badge {
      margin-left: auto;
      font-size: 7px;
      font-weight: 800;
      letter-spacing: .1em;
      color: var(--bg);
      background: var(--gold);
      border-radius: 2px;
      padding: 2px 5px;
    }

    .sb-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--ln);
      flex-shrink: 0;
    }
    .sb-footer-date { font-size: 9px; color: var(--t3); }
    .sb-footer-ver { font-size: 8px; color: var(--t4); margin-top: 3px; }

    /* ── MAIN WRAP ─────────────────────────────────────────── */
    .main-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── TOPBAR ────────────────────────────────────────────── */
    .topbar {
      height: var(--th);
      min-height: var(--th);
      background: var(--surf);
      border-bottom: 1px solid var(--ln);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 12px;
      flex-shrink: 0;
    }
    .tb-crumb { display: flex; align-items: center; gap: 7px; font-size: 11px; }
    .tb-sec { color: var(--t3); }
    .tb-sep { color: var(--t4); font-size: 9px; }
    .tb-page { color: var(--t1); font-weight: 600; }
    .tb-right { margin-left: auto; display: flex; align-items: center; gap: 18px; }
    .tb-date { font-size: 10px; color: var(--t3); }
    .tb-dot { width: 7px; height: 7px; background: var(--grn); border-radius: 50%; box-shadow: 0 0 0 2px rgba(127,174,122,.18); }
    .tb-user { font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: .04em; }

    /* ── CONTENT ───────────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 36px 40px 72px;
    }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-thumb { background: var(--ln); border-radius: 2px; }

    /* ── PAGE HEADER ───────────────────────────────────────── */
    .pg-hd { margin-bottom: 28px; }
    .pg-tag {
      display: block;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .pg-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.1;
    }
    .pg-title em { color: var(--gold); font-style: normal; }
    .pg-sub { font-size: 12px; color: var(--t3); margin-top: 6px; line-height: 1.6; }

    /* ── KPI GRID ──────────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: 1px;
      background: var(--ln);
      border: 1px solid var(--ln);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 28px;
    }
    .kpi {
      background: var(--surf);
      padding: 18px 18px 16px;
      transition: background .2s;
    }
    .kpi:hover { background: var(--s2); }
    .kpi-lbl {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 8px;
    }
    .kpi-val {
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -.03em;
      line-height: 1;
    }
    .kpi-val.w { color: var(--t1); }
    .kpi-val.g { color: var(--grn); }
    .kpi-sub2 { font-size: 9px; color: var(--t3); margin-top: 5px; }

    /* ── SEC TITLE ─────────────────────────────────────────── */
    .sec {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 14px;
    }
    .sec::before { content: ''; width: 3px; height: 13px; background: var(--gold); border-radius: 1px; flex-shrink: 0; }
    .sec::after  { content: ''; flex: 1; height: 1px; background: var(--ln); }

    /* ── GRID ──────────────────────────────────────────────── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media (max-width: 960px) {
      .g2 { grid-template-columns: 1fr; }
      .g3 { grid-template-columns: 1fr 1fr; }
      .g4 { grid-template-columns: 1fr 1fr; }
    }

    /* ── CARD ──────────────────────────────────────────────── */
    .card {
      background: var(--surf);
      border: 1px solid var(--ln);
      border-radius: var(--r);
      padding: 18px;
    }
    .card-ttl {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 12px;
    }

    /* ── TABLE ─────────────────────────────────────────────── */
    .tw {
      border: 1px solid var(--ln);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 24px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--t3);
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--ln);
      background: var(--surf);
    }
    thead th.r { text-align: right; }
    tbody td {
      font-size: 12px;
      font-weight: 500;
      color: var(--t2);
      padding: 10px 16px;
      border-bottom: 1px solid var(--ln2);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(240,237,230,.015); }
    .r { text-align: right; font-variant-numeric: tabular-nums; }
    .au { color: var(--gold); font-weight: 700; }
    .ag { color: var(--grn); font-weight: 600; }
    .ar { color: var(--red); font-weight: 600; }
    .tf td {
      background: var(--ga);
      border-top: 1px solid var(--gb);
      font-weight: 700;
      color: var(--t1);
    }
    .tf td.r { color: var(--gold); font-size: 13px; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; }

    /* ── TABS ──────────────────────────────────────────────── */
    .tabs { display: flex; border-bottom: 1px solid var(--ln); margin-bottom: 20px; }
    .tab-b {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--t3);
      padding: 10px 18px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
      user-select: none;
    }
    .tab-b:hover { color: var(--t2); }
    .tab-b.on { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-p { display: none; }
    .tab-p.on { display: block; }

    /* ── BAR CHART ─────────────────────────────────────────── */
    .chart { display: flex; align-items: flex-end; gap: 10px; height: 130px; }
    .bc { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
    .bv { font-size: 8px; font-weight: 700; color: var(--gold); opacity: 0; transition: opacity .2s; white-space: nowrap; }
    .bc:hover .bv { opacity: 1; }
    .br { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
    .br.a { background: var(--gold); opacity: .72; }
    .br.b { background: #8A6830; opacity: .82; }
    .bc:hover .br { opacity: 1 !important; }
    .bl { font-size: 9px; font-weight: 600; color: var(--t3); }

    /* ── BADGE ─────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 2px;
    }
    .badge.live { background: rgba(127,174,122,.12); color: var(--grn); }
    .badge.dev  { background: rgba(201,168,76,.1);   color: var(--gold); }
    .badge.plan { background: rgba(112,144,168,.1);  color: var(--blu); }
    .badge.seed { background: rgba(127,174,122,.09); color: var(--grn); }
    .bdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* ── PROJECT CARD ──────────────────────────────────────── */
    .pj {
      background: var(--surf);
      border: 1px solid var(--ln);
      border-radius: var(--r);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: background .2s;
    }
    .pj:hover { background: var(--s2); }
    .pj-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .pj-tag { font-size: 7.5px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--t3); margin-bottom: 7px; }
    .pj-name { font-size: 15px; font-weight: 800; color: var(--t1); margin-bottom: 8px; letter-spacing: -.01em; }
    .pj-desc { font-size: 11px; color: var(--t3); line-height: 1.7; margin-bottom: 14px; }
    .pj-foot { display: flex; align-items: center; justify-content: space-between; }
    .pj-link { font-size: 10px; color: var(--gold); cursor: pointer; }

    /* ── EMPLOYEE CARD ─────────────────────────────────────── */
    .emp {
      background: var(--surf);
      border: 1px solid var(--ln);
      border-radius: var(--r);
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .emp::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 3px; }
    .emp-name { font-size: 13px; font-weight: 800; margin-bottom: 2px; }
    .emp-role { font-size: 8px; color: var(--t3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 12px; }
    .emp-total { font-size: 22px; font-weight: 800; letter-spacing: -.03em; line-height: 1; margin-bottom: 3px; }
    .emp-lbl { font-size: 9px; color: var(--t3); margin-bottom: 14px; }
    .emp-bars { display: flex; flex-direction: column; gap: 5px; }
    .emp-row { display: flex; align-items: center; gap: 8px; }
    .emp-ml { width: 28px; font-size: 8px; font-weight: 700; color: var(--t3); text-transform: uppercase; }
    .emp-trk { flex: 1; height: 3px; background: var(--ln); border-radius: 2px; overflow: hidden; }
    .emp-fill { height: 100%; border-radius: 2px; }
    .emp-amt { width: 64px; text-align: right; font-size: 10px; color: var(--t2); font-variant-numeric: tabular-nums; }

    /* ── DOC LINK ──────────────────────────────────────────── */
    .dl {
      background: var(--surf);
      border: 1px solid var(--ln);
      border-radius: var(--r);
      padding: 14px 16px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background .2s, border-color .2s;
      cursor: pointer;
    }
    .dl:hover { background: var(--s2); border-color: var(--gb); }
    .dl-ico { font-size: 17px; flex-shrink: 0; }
    .dl-ttl { font-size: 12px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
    .dl-sub { font-size: 10px; color: var(--t3); }
    .dl-arr { margin-left: auto; color: var(--t4); font-size: 10px; flex-shrink: 0; }

    /* ── QUICK ACCESS TILE ─────────────────────────────────── */
    .qa {
      background: var(--surf);
      border: 1px solid var(--ln);
      border-radius: var(--r);
      padding: 18px;
      cursor: pointer;
      transition: background .2s, border-color .2s;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .qa:hover { background: var(--s2); border-color: var(--gb); }
    .qa-ico { font-size: 20px; }
    .qa-lbl { font-size: 11px; font-weight: 700; color: var(--t1); }
    .qa-sub { font-size: 9px; color: var(--t3); line-height: 1.5; }
    .qa-arr { margin-top: auto; font-size: 9px; color: var(--gold); font-weight: 700; letter-spacing: .06em; }

    /* ── NOTE ──────────────────────────────────────────────── */
    .note {
      border-left: 3px solid var(--gb);
      padding: 10px 14px;
      font-size: 11.5px;
      color: var(--t2);
      margin-bottom: 24px;
      line-height: 1.7;
      background: var(--gc);
      border-radius: 0 var(--r) var(--r) 0;
    }

    /* ── ACTIVITY ──────────────────────────────────────────── */
    .activity { display: flex; flex-direction: column; }
    .act-item { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--ln2); }
    .act-item:last-child { border-bottom: none; }
    .act-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .act-body { flex: 1; min-width: 0; }
    .act-txt { font-size: 12px; color: var(--t2); line-height: 1.5; }
    .act-txt strong { color: var(--t1); }
    .act-date { font-size: 9px; color: var(--t3); margin-top: 2px; }

    /* ── LEGEND ────────────────────────────────────────────── */
    .legend { display: flex; gap: 16px; margin-top: 10px; }
    .leg-item { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--t3); }
    .leg-dot { width: 8px; height: 8px; border-radius: 1px; }

    /* ── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .content { padding: 20px 16px 52px; }
      .topbar { padding: 0 16px; }
    }
  </style>
</head>

/* ── UTILS ────────────────────────────────────────────────────── */
const fmt = n => n.toLocaleString('es-ES',{minimumFractionDigits:0}) + ' €';
const fmtD = n => n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
const greet = () => { const h=new Date().getHours(); return h<13?'Buenos días':h<20?'Buenas tardes':'Buenas noches'; };
const todayLong = () => {
  const d=new Date();
  const D2=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const M=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${D2[d.getDay()]} ${d.getDate()} de ${M[d.getMonth()]} de ${d.getFullYear()}`;
};
const todayShort = () => new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});

function buildChart(id, monthly) {
  const el=document.getElementById(id); if(!el) return;
  const max=Math.max(...monthly.map(r=>r.y+r.b));
  el.innerHTML='';
  monthly.forEach(({m,y,b})=>{
    const total=y+b;
    const col=document.createElement('div');
    col.className='bc';
    col.innerHTML=`
      <div class="bv">${fmt(total)}</div>
      <div style="width:100%;display:flex;flex-direction:column;gap:2px;justify-content:flex-end;height:${(total/max)*100}%">
        <div class="br b" style="height:${(b/total)*100}%"></div>
        <div class="br a" style="height:${(y/total)*100}%"></div>
      </div>
      <div class="bl">${m}</div>`;
    el.appendChild(col);
  });
}

function buildEmpBars(id, months, color) {
  const el=document.getElementById(id); if(!el) return;
  const max=Math.max(...months.map(r=>r.v));
  el.innerHTML='';
  months.forEach(({m,v})=>{
    const row=document.createElement('div');
    row.className='emp-row';
    row.innerHTML=`
      <div class="emp-ml">${m}</div>
      <div class="emp-trk"><div class="emp-fill" style="width:${(v/max)*100}%;background:${color}"></div></div>
      <div class="emp-amt">${fmt(v)}</div>`;
    el.appendChild(row);
  });
}

/* ── ROUTER ───────────────────────────────────────────────────── */
function go(id) {
  if (!V[id]) return;
  const view = V[id];

  document.querySelectorAll('.sb-item').forEach(el =>
    el.classList.toggle('active', el.dataset.view === id));

  document.getElementById('tb-sec').textContent = view.sec;
  document.getElementById('tb-pg').textContent  = view.pg;

  const content = document.getElementById('content');
  content.innerHTML = view.html();
  content.scrollTop = 0;

  if (view.after) setTimeout(() => view.after(), 0);
  history.replaceState(null, '', '#' + id);
}

/* ── INIT ─────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  const short = todayShort();
  document.getElementById('sb-date').textContent = short;
  document.getElementById('tb-date').textContent = short;

  document.querySelectorAll('.sb-item[data-view]').forEach(el =>
    el.addEventListener('click', () => go(el.dataset.view)));

  const hash = location.hash.slice(1);
  go(hash && V[hash] ? hash : 'dashboard');
});
</script>
